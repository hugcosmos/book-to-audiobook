[project]
name = "book-to-audiobook"
version = "0.1.0"
description = "Convert ebooks to audiobooks with chapter markers"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "jinja2>=3.1.0",
    "python-multipart>=0.0.18",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "ebooklib>=0.19",
    "beautifulsoup4>=4.12",
    "lxml>=5.0",
    "pymupdf>=1.25.0",
    "edge-tts>=7.0.0",
    "pydub>=0.25.1",
    "mutagen>=1.47",
    "sentencex>=0.6.0",
    "aiofiles>=24.0",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["app*", "core*", "config*", "utils*"]
